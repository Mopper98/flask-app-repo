apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-deployment
  namespace: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app
        image: moppperdockerhub/flask-app:1.0
        ports:
        - containerPort: 5000
        env:
        - name: MY_POD
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
